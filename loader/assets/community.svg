<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 188" fill="none"
     stroke="#fff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"
     role="img" aria-label="A small community of houses and trees">

  <!-- ground lines (two depth tiers) -->
  <path d="M14 96 H242"/>
  <path d="M14 168 H242"/>

  <!-- ===== BACK ROW (smaller, higher) ===== -->
  <!-- trees, left -->
  <g>
    <circle cx="34" cy="60" r="14"/><path d="M34 74 V96"/>
    <circle cx="64" cy="52" r="18"/><path d="M64 70 V96"/>
    <circle cx="96" cy="64" r="11"/><path d="M96 75 V96"/>
  </g>
  <!-- centre house -->
  <path d="M120 96 V60 H156 V96"/>
  <path d="M114 61 L138 41 L162 61"/>
  <path d="M132 96 V80 H144 V96"/>
  <!-- right house with grid window + chimney -->
  <path d="M176 96 V58 H224 V96"/>
  <path d="M170 59 L200 37 L230 59"/>
  <path d="M214 50 V37 H222 V54"/>
  <path d="M188 72 H208 M198 64 V84 M188 64 H208 V84 H188 Z"/>

  <!-- ===== FRONT ROW (larger, lower) ===== -->
  <!-- big gabled house, left -->
  <path d="M30 168 V120 H92 V168"/>
  <path d="M22 121 L61 92 L100 121"/>
  <path d="M52 168 V146 H70 V168"/>          <!-- door -->
  <path d="M40 132 H48 V140 H40 Z"/>          <!-- window -->
  <path d="M74 132 H82 V140 H74 Z"/>          <!-- window -->
  <!-- tree, right -->
  <circle cx="206" cy="120" r="22"/><path d="M206 142 V168"/>
  <circle cx="168" cy="138" r="12"/><path d="M168 150 V168"/>
</svg>
