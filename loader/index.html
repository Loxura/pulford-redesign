<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pulford — Door Intro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#000; --white:#fff;
    --ease:cubic-bezier(.16,1,.3,1);
    --ease-door:cubic-bezier(.62,0,.16,1);
    --dh:88vh;                       /* door height */
    --dw:calc(88vh * 0.96);          /* door width (image aspect 870:906) */
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--black);color:var(--white);
    font-family:"Outfit",system-ui,sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased}

  /* ============ NEW SITE (revealed behind) ============ */
  .site{position:fixed;inset:0;min-height:100dvh;background:var(--black);color:var(--white);
    display:grid;grid-template-rows:auto 1fr auto;opacity:0;transition:opacity 1s var(--ease) 1.7s}
  .site.show{opacity:1}
  .site__bar{display:flex;align-items:center;justify-content:space-between;
    padding:26px clamp(20px,5vw,60px);border-bottom:1px solid rgba(255,255,255,.1)}
  .site__bar b{font-weight:600;letter-spacing:.42em;font-size:15px;padding-left:.42em}
  .site__nav{display:flex;gap:34px;font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5)}
  .site__nav span{cursor:pointer;transition:color .25s}.site__nav span:hover{color:#fff}
  @media(max-width:720px){.site__nav{display:none}}
  .site__hero{align-self:center;width:100%;max-width:1180px;margin:0 auto;padding:0 clamp(20px,5vw,60px)}
  .site__hero .tag{font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:rgba(255,255,255,.45);display:block;margin-bottom:22px}
  .site__hero h1{font-weight:300;font-size:clamp(36px,6.5vw,82px);line-height:1.02;letter-spacing:-.02em;max-width:16ch}
  .site__hero h1 b{font-weight:600}
  .site__foot{padding:22px clamp(20px,5vw,60px);border-top:1px solid rgba(255,255,255,.1);
    font-size:12px;letter-spacing:.1em;color:rgba(255,255,255,.38)}

  /* ============ DOOR INTRO ============ */
  .stage{position:fixed;inset:0;z-index:10;perspective:2200px;perspective-origin:50% 48%}
  .stage.gone{display:none}

  /* --- revealed behind the doors: the kid (front) welcoming, village above/behind --- */
  .reveal{position:absolute;inset:0;opacity:0;transition:opacity .8s var(--ease)}
  .reveal__in{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    display:flex;flex-direction:column;align-items:center;gap:2.5vh;transform-style:preserve-3d;
    transition:transform 1s var(--ease-door),opacity .9s var(--ease)}
  .village{width:34vh;height:auto;transform:translateZ(-40px);opacity:.9}
  .kid{height:46vh;width:auto}
  .ready.is-open .reveal{opacity:1;transition-delay:.5s}
  .is-open .reveal__in{transform:translate(-50%,-50%) scale(1.7);opacity:0;transition-delay:1.4s} /* walk through */

  /* --- the big doors: two halves of one image, hinged on their outer edges --- */
  .doors{position:absolute;left:50%;top:50%;width:var(--dw);height:var(--dh);
    transform:translate(-50%,-50%) scale(.95);opacity:0;transform-style:preserve-3d;
    transition:transform 1s var(--ease-door),opacity .8s var(--ease)}
  .ready .doors{transform:translate(-50%,-50%) scale(1);opacity:1}
  .door{position:absolute;top:0;height:100%;width:50%;backface-visibility:hidden;
    background-image:url(assets/doors.png);background-repeat:no-repeat;background-size:var(--dw) var(--dh);
    transition:transform 1.3s var(--ease-door),opacity .5s ease}
  .door--l{left:0;transform-origin:left center;background-position:left center}
  .door--r{right:0;transform-origin:right center;background-position:right center}

  /* ---- OPEN ---- */
  .is-open .door--l{transform:rotateY(-110deg)}
  .is-open .door--r{transform:rotateY(110deg)}
  .is-open .door{opacity:0;transition-delay:.85s}

  .replay{position:fixed;bottom:22px;right:24px;z-index:30;display:inline-flex;align-items:center;gap:9px;
    font-family:inherit;font-size:13px;color:rgba(255,255,255,.5);background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.16);padding:9px 16px;border-radius:999px;cursor:pointer;
    transition:color .2s,border-color .2s,transform .15s var(--ease)}
  .replay:hover{color:#fff;border-color:rgba(255,255,255,.45)}
  .replay:active{transform:translateY(1px) scale(.99)}.replay svg{width:14px;height:14px}

  @media (prefers-reduced-motion: reduce){
    .doors,.door,.reveal,.reveal__in,.site{transition:none!important}
    .is-open .door{transform:none;opacity:0}
  }
</style>
</head>
<body>

  <main class="site" id="site">
    <header class="site__bar">
      <b>PULFORD</b>
      <nav class="site__nav"><span>About</span><span>Services</span><span>Get Involved</span><span>Contact</span></nav>
    </header>
    <section class="site__hero">
      <span class="tag">Community Living Services</span>
      <h1>Everyone deserves an open <b>door.</b></h1>
    </section>
    <footer class="site__foot">New site — design in progress.</footer>
  </main>

  <div class="stage" id="stage">
    <!-- revealed behind -->
    <div class="reveal">
      <div class="reveal__in">
        <img class="village" src="assets/village.png" alt="">
        <img class="kid" src="assets/kid.png" alt="Pulford — welcome">
      </div>
    </div>
    <!-- the big doors -->
    <div class="doors">
      <div class="door door--l"></div>
      <div class="door door--r"></div>
    </div>
  </div>

  <button class="replay" id="replayBtn" title="Replay">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/>
    </svg>
    Replay
  </button>

<script>
  const stage=document.getElementById('stage'), site=document.getElementById('site'),
        replay=document.getElementById('replayBtn'); let timer;
  function play(){
    clearTimeout(timer);
    stage.classList.remove('gone','is-open','ready'); site.classList.remove('show');
    void stage.offsetWidth;                              /* reflow so replay restarts cleanly */
    requestAnimationFrame(()=>{
      stage.classList.add('ready');                      /* doors settle in */
      setTimeout(()=>{
        stage.classList.add('is-open'); site.classList.add('show');
        timer=setTimeout(()=> stage.classList.add('gone'), 2800);
      }, 1200);
    });
  }
  replay.addEventListener('click', play);
  window.addEventListener('load', play);
</script>
</body>
</html>
