<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 240" width="220" height="240" role="img" aria-label="Pulford — a figure with open arms in a doorway opening onto a community">
  <defs>
    <radialGradient id="pf-glow" cx="50%" cy="46%" r="58%">
      <stop offset="0%" stop-color="#2da3e6" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#0779bf" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0779bf" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="pf-opening"><rect x="52" y="30" width="116" height="184"/></clipPath>
  </defs>

  <!-- light behind the doorway -->
  <g clip-path="url(#pf-opening)">
    <rect x="52" y="30" width="116" height="184" fill="url(#pf-glow)"/>
  </g>

  <!-- COMMUNITY SCENE (line-art, clipped to the opening) -->
  <g clip-path="url(#pf-opening)" fill="none" stroke="#F2F2F2" stroke-width="2.4"
     stroke-linecap="round" stroke-linejoin="round">
    <!-- horizon / ground -->
    <path d="M52 150 H168"/>
    <!-- centre house (behind the head) -->
    <path d="M99 104 V80 H121 V104"/>
    <path d="M95 81 L110 67 L125 81"/>
    <path d="M106 104 V92 H114 V104"/>
    <!-- left house -->
    <path d="M62 150 V114 H84 V150"/>
    <path d="M58 115 L73 101 L88 115"/>
    <path d="M69 150 V134 H77 V150"/>
    <!-- right house -->
    <path d="M134 150 V110 H158 V150"/>
    <path d="M130 111 L146 96 L162 111"/>
    <path d="M142 150 V132 H150 V150"/>
    <circle cx="151" cy="121" r="2.2"/>
    <!-- trees -->
    <circle cx="56" cy="121" r="9"/><path d="M56 130 V150"/>
    <circle cx="92" cy="110" r="11"/><path d="M92 121 V150"/>
    <circle cx="126" cy="120" r="8"/><path d="M126 128 V150"/>
  </g>

  <!-- THE FIGURE (welcoming, open arms) -->
  <g fill="#F2F2F2">
    <circle cx="110" cy="128" r="12"/>
    <path d="M97 151 C97 144 102 139 110 139 C118 139 123 144 123 151
             L129 212 L91 212 Z"/>
    <!-- arms -->
    <g id="pf-arm-l">
      <path d="M99 151 C92 146 84 135 79 122 L85 119 C90 131 98 143 104 150 Z"/>
    </g>
    <g id="pf-arm-r">
      <path d="M121 151 C128 146 136 135 141 122 L135 119 C130 131 122 143 116 150 Z"/>
    </g>
  </g>

  <!-- DOORWAY FRAME (solid) -->
  <g fill="#F2F2F2">
    <rect x="40" y="18" width="12" height="200"/>   <!-- left jamb -->
    <rect x="168" y="18" width="12" height="200"/>  <!-- right jamb -->
    <rect x="40" y="18" width="140" height="12"/>   <!-- lintel -->
    <rect x="33" y="214" width="154" height="8" rx="2"/> <!-- threshold -->
  </g>
</svg>
